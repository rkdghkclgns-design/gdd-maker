<!doctype html>
<html lang="ko">
<head>
<!-- 확장 노이즈 필터는 다른 어떤 것보다 먼저 실행되어야 함 — meta/title 보다 위에 배치.
     extensions 가 document_start 에서 실행되므로 우리도 가능한 한 빨리 등록. -->
<script>
/* 브라우저 확장(번역기/패스워드 매니저/애드블락 등)이 일으키는 노이즈를 5중 방어로 차단.
   우리 앱의 진짜 에러는 그대로 콘솔에 노출됨.

   1) unhandledrejection 이벤트 (capture) — Promise reject
   2) rejectionhandled 이벤트 — handled 후의 잔여 노이즈
   3) error 이벤트 (capture) — 동기 throw
   4) 모든 console.* 메서드 패치 — Chrome V8 가 직접 출력하는 "Uncaught (in promise)" 차단
   5) Promise.prototype 의 catch wrap (옵션) — 향후 reject 의 reason 도 패턴 검사
*/
(function () {
  var EXT_NOISE_PATTERNS = [
    /listener indicated an asynchronous response/i,
    /message channel closed before a response was received/i,
    /Extension context invalidated/i,
    /The message port closed before a response was received/i,
    /Unchecked runtime\.lastError/i,
    /Uncaught \(in promise\)/i,
    /chrome-extension:\/\//i,
    /moz-extension:\/\//i,
    /safari-extension:\/\//i,
    /webkit-masked-url:\/\//i,
    /A listener indicated/i,
  ];
  function matchesNoise(text) {
    if (text == null) return false;
    var str;
    try {
      if (typeof text === 'string') str = text;
      else if (text && typeof text.message === 'string') str = text.message;
      else str = String(text);
    } catch (_) { return false; }
    return EXT_NOISE_PATTERNS.some(function (re) { return re.test(str); });
  }
  function anyArgNoise(args) {
    try {
      for (var i = 0; i < args.length; i++) {
        var a = args[i];
        if (matchesNoise(a)) return true;
        if (a && typeof a === 'object') {
          if (matchesNoise(a.message)) return true;
          if (matchesNoise(a.stack)) return true;
        }
      }
    } catch (_) {}
    return false;
  }
  function isExtensionNoise(reason) {
    if (reason == null) return false;
    var msg = '';
    try {
      if (typeof reason === 'string') msg = reason;
      else if (reason && reason.message) msg = String(reason.message);
      else msg = String(reason);
      if (reason && reason.stack) msg += ' ' + String(reason.stack);
    } catch (_) {}
    return matchesNoise(msg);
  }
  // (1) Promise reject 이벤트 — capture 단계 + preventDefault
  window.addEventListener('unhandledrejection', function (e) {
    if (isExtensionNoise(e.reason)) {
      e.preventDefault();
      e.stopImmediatePropagation();
    }
  }, true);
  // (2) 늦게 handled 된 rejection 도 추가 차단
  window.addEventListener('rejectionhandled', function (e) {
    if (isExtensionNoise(e.reason)) {
      e.preventDefault();
      e.stopImmediatePropagation();
    }
  }, true);
  // (3) 동기 error 이벤트
  window.addEventListener('error', function (e) {
    if (isExtensionNoise(e.error || e.message) || matchesNoise(e.filename)) {
      e.preventDefault();
      e.stopImmediatePropagation();
    }
  }, true);
  // (4) 모든 console 메서드 패치 — Chrome 의 자동 reporting 도 흡수
  ['log', 'info', 'debug', 'warn', 'error', 'trace'].forEach(function (level) {
    var orig = console[level];
    if (!orig) return;
    console[level] = function () {
      if (anyArgNoise(arguments)) return; // 확장 노이즈 → drop
      return orig.apply(console, arguments);
    };
  });

  // (5) 마지막 안전망 — 노이즈 매칭되는 Promise rejection 을 silent 하게 catch.
  //
  // 핵심 아이디어: Promise.prototype.then 을 건드리지 않고, addEventListener 가 등록되기
  // 직전에 발생한 rejection 의 reason 도 추후 promise 가 떠 있을 때 silent 처리.
  // window.addEventListener('unhandledrejection') 는 이미 capture 단계에 등록되어
  // preventDefault + stopImmediatePropagation 을 하지만, 일부 Chrome 버전은 이 콜백이
  // 등록되기 전 microtask 큐에서 이미 V8 에 의해 로깅된 후일 수 있다.
  //
  // 그래서 추가 보호: window.onunhandledrejection 도 함수로 직접 할당 (이벤트 리스너와
  // 별도 채널) → 이중 등록.
  try {
    var prevHandler = window.onunhandledrejection;
    window.onunhandledrejection = function (e) {
      try {
        if (isExtensionNoise(e && e.reason)) {
          if (e && typeof e.preventDefault === 'function') e.preventDefault();
          return true; // 처리됨
        }
      } catch (_) {}
      if (typeof prevHandler === 'function') return prevHandler.apply(this, arguments);
    };
  } catch (_) {}
})();
</script>
